name: Monitor LABEL_SYNC_TOKEN expiry

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT expiry
        env:
          LABEL_SYNC_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "$LABEL_SYNC_TOKEN" ]]; then
            echo "::error::LABEL_SYNC_TOKEN secret is missing"
            exit 1
          fi

          EXPIRY_HEADER=$(curl -s -I \
            -H "Authorization: token $LABEL_SYNC_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user \
            | grep -i 'github-authentication-token-expiration' \
            | sed 's/[^:]*: //;s/\r//' || true)

          if [[ -z "$EXPIRY_HEADER" ]]; then
            echo "::warning::Token has no expiration header (classic PAT?). Skipping check."
            exit 0
          fi

          EXPIRY_TS=$(date -d "$EXPIRY_HEADER" +%s 2>/dev/null || true)
          if [[ -z "$EXPIRY_TS" ]]; then
            echo "::error::Could not parse expiry: $EXPIRY_HEADER"
            exit 1
          fi

          NOW_TS=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_TS - NOW_TS) / 86400 ))

          echo "Token expires: $EXPIRY_HEADER ($DAYS_LEFT days remaining)"

          if [[ $DAYS_LEFT -lt 14 ]]; then
            gh issue create \
              --repo thkt/github-labels \
              --title "[LABEL_SYNC_TOKEN] expires in $DAYS_LEFT days" \
              --body "Token expires on $EXPIRY_HEADER ($DAYS_LEFT days remaining). Renew at https://github.com/settings/personal-access-tokens before expiry to avoid sync failures." \
              --label priority:high
          fi
